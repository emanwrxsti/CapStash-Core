# These environment variables are set by the build process and read by
# test/*/test_runner.py and test/util/rpcauth-test.py

[environment]
PACKAGE_NAME=CapStash Core
PACKAGE_BUGREPORT=https://github.com/CapStash/CapStash/issues
SRCDIR=/home/eman/CapStash-Core-27.1.0
BUILDDIR=/home/eman/CapStash-Core-27.1.0
EXEEXT=
RPCAUTH=/home/eman/CapStash-Core-27.1.0/share/rpcauth/rpcauth.py

[components]
# Which components are enabled. These are commented out by `configure` if they were disabled when running config.
ENABLE_WALLET=true
USE_SQLITE=true
#USE_BDB=true
ENABLE_CLI=true
ENABLE_CAPSTASH_UTIL=true
ENABLE_WALLET_TOOL=true
ENABLE_CAPSTASHD=true
ENABLE_FUZZ_BINARY=true
ENABLE_ZMQ=true
ENABLE_EXTERNAL_SIGNER=true
#ENABLE_USDT_TRACEPOINTS=true
